minimumReleaseAgeExclude:
  - '@ai-sdk/anthropic@4.0.18'
  - '@ai-sdk/gateway@4.0.27'
  - '@ai-sdk/google@4.0.22'
  - '@ai-sdk/openai@4.0.18'
  - '@ai-sdk/openai-compatible@3.0.14'
  - '@ai-sdk/provider@4.0.3'
  - '@ai-sdk/xai@4.0.18'
  - ai@7.0.35
  - tsdown@0.22.8
  - '@toon-format/spec@4.0.0'

shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - vite@5.4.21

packages:
  - docs
  - benchmarks
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
